<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper-Scissors</title>
  </head>
  <body>
    <script>
      let rounds = 5;
      let round = 0;
      let tallyP1 = 0;
      let tallyP2 = 0;
      let tallyDraws = 0;
      function game() {
        round += 1;
        console.log("\nRound " + round);

        let choiceP1 = prompt(
          "Round " + round + "\nChoose your weapon: ROCK, PAPER, SCISSOR",
        );
        choiceP1 = choiceP1.toString().toUpperCase();

        function getRandomInt(max) {
          return Math.floor(Math.random() * max);
        }

        let choiceP2 = getRandomInt(3);

        if (choiceP2 == 0) {
          choiceP2 = "ROCK";
        } else if (choiceP2 == 1) {
          choiceP2 = "PAPER";
        } else if (choiceP2 == 2) {
          choiceP2 = "SCISSOR";
        }

        console.log("Player 1: " + choiceP1);
        console.log("Player 2: " + choiceP2);

        let victor = null;

        if (
          choiceP1 !== "ROCK" &&
          choiceP1 !== "PAPER" &&
          choiceP1 !== "SCISSOR"
        ) {
          console.log("CHEATER! You get nothing, you lose! Good day, Sir!");
        } else if (choiceP1 == "ROCK" && choiceP2 == "SCISSOR") {
          victor = "p1";
        } else if (choiceP1 == "ROCK" && choiceP2 == "PAPER") {
          victor = "p2";
        } else if (choiceP1 == "PAPER" && choiceP2 == "ROCK") {
          victor = "p1";
        } else if (choiceP1 == "PAPER" && choiceP2 == "SCISSOR") {
          victor = "p2";
        } else if (choiceP1 == "SCISSOR" && choiceP2 == "PAPER") {
          victor = "p1";
        } else if (choiceP1 == "SCISSOR" && choiceP2 == "ROCK") {
          victor = "p2";
        }

        if (victor == "p1") {
          tallyP1 += 1;
          console.log(choiceP1 + " beats " + choiceP2 + "!");
        } else if (victor == "p2") {
          tallyP2 += 1;
          console.log(choiceP2 + " beats " + choiceP1 + "!");
        } else {
          tallyDraws += 1;
          console.log("It's a draw!");
        }
        if (round < rounds) {
          if (tallyP2 >= rounds - round && tallyP2 > tallyP1) {
            continueGame();
          } else {
            game();
          }
        } else {
          winner();
        }
      }
      function continueGame() {
        let newRounds = rounds * 2 - 1;
        console.log("newRounds = " + newRounds);
        let addRounds = prompt(
          "You can't win, best of " + newRounds + "?\nYES or NO",
        )
          .toString()
          .toUpperCase();
        if (addRounds === "YES") {
          rounds = newRounds;
          game();
        } else {
          winner();
        }
      }
      function winner() {
        console.log("\n");
        if (tallyP1 > tallyP2) {
          console.log(
            "Player 1 Wins!\n" +
              tallyP1 +
              " victories and " +
              tallyDraws +
              " draws across " +
              rounds +
              " rounds",
          );
        } else if (tallyP2 > tallyP1) {
          console.log(
            "Player 1 Lost!\n" +
              tallyP2 +
              " losses and " +
              tallyDraws +
              " draws across " +
              round +
              " rounds",
          );
        } else {
          console.log("The game is a draw!");
        }
      }
      game();
    </script>
  </body>
</html>
